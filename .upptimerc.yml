    - name: keywords
      content: "Sakneen, status, uptime, monitoring, SaaS, backend, system health, performance, API status, service availability"
    - name: author
      content: "Sakneen"
    - name: robots
      content: "index, follow"
    - property: og:title
      content: "Sakneen System Status & Performance Monitor"
    - property: og:description
      content: "Real-time monitoring of Sakneen's services and infrastructure with transparent performance metrics."
    - property: og:image
      content: "https://img.sakneen.com/logos-email/logo_rOc78V2s7.png"
    - property: og:url
      content: "https://status.sakneen.com"
    - property: og:type
      content: "website"
    - name: twitter:card
      content: "summary_large_image"
    - name: twitter:title
      content: "Sakneen System Status"
    - name: twitter:description
      content: "Real-time monitoring of Sakneen's services and infrastructure"
    - name: twitter:image
      content: "https://img.sakneen.com/logos-email/logo_rOc78V2s7.png"
  links:
    - rel: stylesheet
      href: https://status.sakneen.com/status-history.css?v=history-bars-90d-v1
  scripts:
    - src: https://status.sakneen.com/status-history.js?v=history-bars-90d-v1

# Upptime also supports notifications, assigning issues, and more
# See https://upptime.js.org/docs/configuration

# User agent for requests
userAgent: Sakneen-Uptime-Monitor/1.0

# Skip deschedule for better reliability
skipDeschedule: true

# Delay between monitoring requests (ms) to avoid rate limiting
delay: 2000

# Reduce scheduled GitHub Actions usage while keeping regular production checks.
# Default Upptime cadence is every 5 minutes; this lowers uptime runs by ~83%.
workflowSchedule:
  uptime: "*/30 * * * *"
  responseTime: "0 23 * * *"
  graphs: "0 0 * * *"
  summary: "0 0 * * *"
  staticSite: "0 1 * * *"

# Notifications are configured via repository secrets (Upptime reads these
# env vars directly — NOT via a notifications: block, which it ignores):
#   NOTIFICATION_SLACK=true
#   NOTIFICATION_SLACK_WEBHOOK_URL=<Slack incoming webhook for the incidents channel>
# Optional message overrides: NOTIFICATIONS_DOWN_MESSAGE / NOTIFICATIONS_UP_MESSAGE
# Docs: https://upptime.js.org/docs/notifications

# Issue assignment for incident management
assignees:
  - miladezzat

# i18n configuration for multilingual support
i18n:
  activeIncidents: "Active Incidents"
  allSystemsOperational: "All Systems Operational"
  incidentReport: "Incident #$NUMBER report →"
  pastIncidentsResolved: "Duration: $MINUTES min · $POSTS update"
  activeIncidentSummary: "Opened $DATE with $POSTS posts"
  incidentTitle: "Incident Details"
  incidentDetails: "Incident Details"
  incidentFixed: "Fixed"
  incidentOngoing: "Ongoing"
  incidentOpenedAt: "Opened at"
  incidentClosedAt: "Closed at"
  incidentSubscribe: "Subscribe to updates"
  overall: "Overall"
  up: "Up"
  down: "Down"
  degraded: "Degraded"
