  name: Sakneen Status
  introTitle: "**Sakneen Status**"
  introMessage: "Current uptime and response-time monitoring for Sakneen's production services, powered by Upptime."
  
  # Upptime exposes one status page; avoid links to unsupported routes like /history.
  navbar:
