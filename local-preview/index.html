<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sakneen Status — Local Preview</title>
  <style>
    :root { --ink:#073b3d; --muted:#537275; --line:#d7e5e4; --bg:#f1f8f7; --green:#22c77a; --red:#e45b5b; --fill:#83d9c9; }
    * { box-sizing:border-box; } body { margin:0; background:var(--bg); color:var(--ink); font:16px/1.5 Arial,sans-serif; }
    main { max-width:900px; margin:auto; padding:44px 24px 70px; } .intro { font-size:21px; max-width:760px; margin-bottom:34px; }
    .banner { display:flex; justify-content:space-between; gap:20px; background:#22ad68; color:#fff; border-radius:5px; padding:20px 24px; font-size:21px; font-weight:700; margin-bottom:38px; }
    .section-head { display:flex; justify-content:space-between; align-items:end; margin-bottom:14px; } h1 { font-size:30px; margin:0; }
    .ranges { display:flex; gap:18px; font-weight:700; } button { border:0; background:transparent; color:var(--ink); font:inherit; font-weight:700; cursor:pointer; padding:4px 0; } button.active { color:#167b74; border-bottom:2px solid #167b74; }
    .service { position:relative; background:#fff; border:1px solid #d5d5d5; border-radius:5px; padding:48px 16px 22px; margin:10px 0; overflow:visible; }
    .service.down { border-color:var(--red); } .service h2 { position:absolute; top:18px; left:16px; font-size:21px; font-weight:400; margin:0; } .service p { display:none; }
    .status { position:absolute; top:18px; right:18px; color:#27b66c; font-size:20px; } .down .status { color:var(--red); }
    .chart { width:100%; height:104px; } .chart svg { display:block; width:100%; height:58px; overflow:visible; }
    .bar { fill:#27c96f; cursor:pointer; } .bar.down { fill:var(--red); } .bar.degraded { fill:#f1a51d; } .bar.unknown { fill:#35a8df; }
    .chart-scale { display:flex; align-items:center; gap:28px; color:#aaa; font-size:16px; margin-top:7px; } .chart-scale .rule { height:2px; background:#aaa; flex:1; } .chart-scale strong { font-weight:400; white-space:nowrap; }
    .tooltip { position:fixed; pointer-events:none; display:none; background:#fff; color:#333; padding:24px 28px; min-width:300px; border:1px solid #ddd; border-radius:4px; box-shadow:0 3px 12px #0002; font-size:17px; z-index:5; } .tooltip strong { display:block; font-size:20px; margin-bottom:14px; } footer { text-align:center; margin-top:60px; color:var(--muted); }
    .tooltip { position:fixed; pointer-events:none; display:none; background:#073b3d; color:#fff; padding:8px 10px; border-radius:5px; font-size:12px; z-index:5; } footer { text-align:center; margin-top:60px; color:var(--muted); }
    @media(max-width:700px) { main { padding:28px 14px; } .section-head { align-items:start; flex-direction:column; gap:8px; } .service { grid-template-columns:1fr; padding-right:12px; } .chart { height:90px; } }
  </style>
</head>
<body>
<main>
  <div class="intro">Current uptime monitoring for Sakneen's production services, powered by Upptime.</div>
  <div class="banner"><span>All Systems Operational</span><span>Updated a few seconds ago</span></div>
  <div class="section-head"><div class="ranges"><span id="range-label">Uptime over the past 90 days.</span></div><nav class="ranges" aria-label="Uptime period"><button data-range="24h">24h</button><button data-range="7d">7d</button><button data-range="30d">30d</button><button data-range="90d" class="active">90d</button><button data-range="1y">1y</button><button data-range="all">all</button></nav></div>
  <section id="services" aria-live="polite"></section>
  <footer>Local preview · uptime history status bars</footer>
</main>
<div id="tooltip" class="tooltip"></div>
<script>
let range='90d', allData=[]; const root=document.querySelector('#services'), tip=document.querySelector('#tooltip');
const esc=v=>String(v).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));
const limit=r=>r==='24h'?2:r==='7d'?7:r==='30d'?30:r==='90d'?90:r==='1y'?365:Infinity;
const rangeLabel=r=>r==='24h'?'24 hours':r==='7d'?'7 days':r==='30d'?'30 days':r==='90d'?'90 days':r==='1y'?'1 year':'all available history';
function chart(items, count) {
  const w=860,h=58,p=2,gap=5,bw=Math.max(3,(w-p*2-gap*(count-1))/count),source=items.length?items:[{status:'up',timestamp:new Date().toISOString()}],last=new Date(source[source.length-1].timestamp).getTime(),a=Array.from({length:count},(_,i)=>source[Math.floor(i*source.length/count)]||source[source.length-1]).map((v,i)=>({...v,timestamp:new Date(last-(count-1-i)*86400000).toISOString()}));
  const bars=a.map((v,i)=>'<rect class="bar '+(v.status==='up'?'':v.status==='degraded'?'degraded':'down')+'" x="'+(p+i*(bw+gap))+'" y="3" width="'+bw+'" height="42" data-i="'+i+'" tabindex="0"><title>'+v.status.toUpperCase()+' · '+new Date(v.timestamp).toLocaleDateString()+'</title></rect>').join('');
  const uptime=a.filter(v=>v.status==='up').length/a.length*100;
  return '<svg viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none" role="img" aria-label="Uptime history">'+bars+'</svg><div class="chart-scale"><span>'+rangeLabel(range)+' ago</span><span class="rule"></span><strong>'+uptime.toFixed(1)+' % uptime</strong><span class="rule"></span><span>Today</span></div>';
}
function render() {
  const count=Math.min(90,limit(range)); document.querySelector('#range-label').textContent='Uptime over the past '+rangeLabel(range)+'.';
  root.innerHTML=allData.map(s=>{const items=s.history.slice(-count);return '<article class="service '+(s.status==='up'?'':'down')+'"><h2>'+esc(s.name)+'</h2><span class="status">'+(s.status==='up'?'Operational':'Down')+'</span><div class="chart" data-slug="'+esc(s.slug)+'">'+chart(items,count)+'</div></article>';}).join('');
  document.querySelectorAll('.chart .bar').forEach(c=>{const show=e=>{const item=JSON.parse(e.target.querySelector('title')?.textContent ? JSON.stringify({status:e.target.classList.contains('down')?'down':'up',timestamp:e.target.querySelector('title').textContent.split(' · ')[1]}) : '{}'); const date=new Date(item.timestamp); tip.innerHTML='<strong>'+date.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})+'</strong>'+(item.status==='up'?'No downtime recorded on this day.':'Downtime recorded on this day.'); tip.style.display='block'; tip.style.left=((e.clientX||0)+12)+'px'; tip.style.top=((e.clientY||0)-80)+'px';}; c.onmouseenter=show; c.onfocus=show; c.onmouseleave=()=>tip.style.display='none'; c.onblur=()=>tip.style.display='none';});
}
document.querySelectorAll('[data-range]').forEach(b=>b.onclick=()=>{range=b.dataset.range;document.querySelectorAll('[data-range]').forEach(x=>x.classList.toggle('active',x===b));render();});
fetch('/data.json',{cache:'no-store'}).then(r=>r.json()).then(d=>{allData=d;render();}).catch(e=>root.innerHTML='<p>Could not load local history: '+esc(e.message)+'</p>');
</script>
</body>
</html>
